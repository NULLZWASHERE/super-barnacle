<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RedWing Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070000;
    color: #ff2b2b;
}

/* top bar */
header {
    padding: 15px;
    background: #120000;
    border-bottom: 1px solid #2a0000;
    display: flex;
    gap: 10px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #330000;
    background: #1a0000;
    color: white;
    outline: none;
}

/* layout */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
}

/* card */
.card {
    background: #120000;
    border: 1px solid #2a0000;
    border-radius: 10px;
    padding: 12px;
}

.card:hover {
    border-color: #ff2b2b;
    box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

.title {
    font-size: 16px;
    font-weight: bold;
}

.desc {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 5px;
}

.category {
    margin-top: 8px;
    font-size: 12px;
    color: #ff6b6b;
}

.content {
    margin-top: 10px;
    font-size: 11px;
    background: black;
    padding: 8px;
    border-radius: 6px;
    white-space: pre-wrap;
    border: 1px solid #2a0000;
}

/* button */
button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.status {
    padding: 10px;
    color: #ff8080;
}
</style>
</head>

<body>

<header>
    <input id="search" placeholder="Search scripts..." />
    <select id="filter">
        <option value="all">All</option>
        <option value="visual">Visual</option>
        <option value="combat">Combat</option>
        <option value="admin">Admin</option>
    </select>
</header>

<div id="container" class="container"></div>

<script>
let scriptsData = [];

async function loadScripts() {
    try {
        const res = await fetch(window.location.origin + "/scripts.txt")
        const data = await res.json();

        scriptsData = data.scripts;
        render();

    } catch (err) {
        document.getElementById("container").innerHTML =
            `<div class="status">Failed to load scripts: ${err.message}</div>`;
    }
}

/* EXECUTE FUNCTION */
async function executeScript(script) {
    try {
        const res = await fetch("https://redwingapi.infodmca.org/api/execute", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                script: script.content,
                name: script.name
            })
        });

        const data = await res.json();

        alert("Executed: " + script.name);

        console.log("Execute response:", data);

    } catch (err) {
        alert("Execute failed: " + err.message);
        console.error(err);
    }
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    const container = document.getElementById("container");
    container.innerHTML = "";

    const filtered = scriptsData.filter(s => {
        return (
            (filter === "all" || s.category === filter) &&
            (s.name.toLowerCase().includes(search) ||
             s.description.toLowerCase().includes(search))
        );
    });

    filtered.forEach(script => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="title">${script.name}</div>
            <div class="desc">${script.description}</div>
            <div class="category">${script.category}</div>
            <div class="content">${script.content}</div>
            <button onclick='executeScript(${JSON.stringify(script)})'>
                EXECUTE
            </button>
        `;

        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

loadScripts();
</script>

</body>
</html>
