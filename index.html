<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedWing — Home</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#050000;
  --panel:#0b0000;
  --red:#ff1e1e;
  --red2:#ff3b3b;
  --border:#2a0000;
  --text:#ffffff;
  --muted:#ff6b6b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'JetBrains Mono', monospace;
  background:
    radial-gradient(circle at top,#ff000020,transparent 40%),
    radial-gradient(circle at bottom,#ff000010,transparent 40%),
    var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 22px;
  background:#0a0000;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  backdrop-filter: blur(8px);
}

.logo{
  font-size:20px;
  font-weight:900;
  color:var(--red);
  letter-spacing:4px;
  text-shadow:0 0 18px var(--red);
}

.tag{
  font-size:12px;
  color:var(--muted);
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
}

.hero h1{
  font-size:44px;
  margin:0;
  color:var(--red);
  text-shadow:0 0 25px var(--red);
}

.hero p{
  margin-top:10px;
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  padding:30px;
}

.card{
  background:linear-gradient(180deg,#120000,#070000);
  border:1px solid var(--border);
  padding:20px;
  border-radius:14px;
  transition:0.25s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(255,0,0,0.15),transparent 60%);
  opacity:0;
  transition:0.3s;
}

.card:hover::before{
  opacity:1;
}

.card:hover{
  transform:translateY(-6px);
  border-color:var(--red);
  box-shadow:0 0 25px rgba(255,30,30,0.35);
}

.card h3{
  margin:0;
  color:var(--red2);
}

.card p{
  font-size:12px;
  color:var(--muted);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#444;
  border-top:1px solid var(--border);
}
</style>
</head>

<body>

<header>
  <div class="logo">REDWING</div>
  <div class="tag">API Dashboard • Executor System</div>
</header>

<section class="hero">
  <h1>Welcome to RedWing</h1>
  <p>Fast. Clean. Script Execution Platform.</p>
</section>

<section class="grid">

  <div class="card" onclick="go('/username.html')">
    <h3>Username</h3>
    <p>Set or link your roblox user</p>
  </div>

  <div class="card" onclick="go('/games.html')">
    <h3>Games</h3>
    <p>Browse supported games & environments</p>
  </div>

  <div class="card" onclick="go('/scripts.html')">
    <h3>Scripts</h3>
    <p>Community scripts & saved payloads</p>
  </div>


</section>


<script>
const API_BASE = window.location.origin;

function go(path){
  window.location.href = API_BASE + path;
}

/* subtle red glow follow effect */
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('mousemove', e=>{
    const rect = card.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    card.style.setProperty('--x', x + '%');
    card.style.setProperty('--y', y + '%');
  });
});
</script>

</body>
</html>
