<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedWing Server Side</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --bg-card:#0f0f12;
    --border:#2b1111;
    --accent:#ff1f1f;
    --text:#ffffff;
    --text-muted:#9ca3af;
    --radius-lg:24px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: radial-gradient(circle at top,#ff000025,transparent 35%),
                radial-gradient(circle at bottom,#ff000015,transparent 30%),
                var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
}

.dashboard-layout{display:flex;min-height:100vh;}

.sidebar{
    width:280px;
    background:rgba(10,10,10,.95);
    border-right:1px solid var(--border);
    padding:28px;
    display:flex;
    flex-direction:column;
}

.logo{display:flex;gap:14px;margin-bottom:40px;align-items:center;}
.logo-icon{
    width:48px;height:48px;border-radius:16px;
    background:linear-gradient(135deg,#ff0000,#700000);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
}

.sidebar-link{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    color:#ddd;
    text-decoration:none;
}

.sidebar-link:hover,.sidebar-link.active{
    background:rgba(255,0,0,.12);
    border:1px solid rgba(255,0,0,.25);
    color:#fff;
}

.main-content{flex:1;padding:40px;}

.header h1{font-size:42px;margin-bottom:8px;}
.header p{color:var(--text-muted);margin-bottom:20px;}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin:20px 0 30px;
}

input,select{
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#0a0a0a;
    color:#fff;
    outline:none;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin:20px 0;
}

.stat-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:20px;
}

.stat-card h2{color:var(--accent);font-size:34px;}

.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:24px;
}

.game-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    transition:.3s;
}

.game-card:hover{
    transform:translateY(-8px);
    border-color:var(--accent);
}

.game-thumb{
    height:180px;
    background-size:cover;
    background-position:center;
    position:relative;
}

.game-badge{
    position:absolute;
    top:12px;
    right:12px;
    background:rgba(255,0,0,.8);
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
}

.game-content{padding:20px;}

.game-name{font-size:18px;font-weight:800;}
.game-owner{color:var(--text-muted);margin-bottom:15px;}

.game-stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.stat-item{
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    padding:10px;
    border-radius:12px;
}

.stat-val{font-size:16px;font-weight:800;}

.server-list{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:220px;
    overflow:auto;
}

.join-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#ff0000,#8b0000);
    color:white;
    font-weight:800;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="dashboard-layout">

<aside class="sidebar">
<div class="logo">
<div class="logo-icon">R</div>
<h2>RedWing</h2>
</div>

<a class="sidebar-link active">📡 Live Servers</a>
<a class="sidebar-link">⚡ Executor</a>
<a class="sidebar-link">🎮 Games</a>
<a class="sidebar-link">⚙️ Settings</a>
</aside>

<main class="main-content">

<div class="header">
<h1>RedWing Server Side</h1>
<p>Active Roblox servers running your system.</p>

<div class="controls">
<input id="search" placeholder="Search games...">
<select id="sort">
    <option value="players">Most Players</option>
    <option value="visits">Most Visits</option>
</select>
</div>
</div>

<div class="stats">
<div class="stat-card">
<h2 id="gameCount">0</h2>
<p>Tracked Games</p>
</div>

<div class="stat-card">
<h2 id="playerCount">0</h2>
<p>Total Players</p>
</div>
</div>

<div class="game-grid" id="gamesContainer"></div>

</main>
</div>

<script>
let gamesData = [];

async function fetchGames(){
    try{
        const res = await fetch(window.location.origin + "/api/games")
        const data = await res.json();
        gamesData = data.games || [];
        renderGames();
    }catch(err){
        console.error(err);
        document.getElementById("gamesContainer").innerHTML =
            "<p style='color:red'>Failed to load API</p>";
    }
}

function renderGames(){
    const container = document.getElementById("gamesContainer");
    const search = document.getElementById("search").value.toLowerCase();
    const sort = document.getElementById("sort").value;

    let games = [...gamesData];

    if(search){
        games = games.filter(g =>
            (g.name || "").toLowerCase().includes(search) ||
            (g.creator || "").toLowerCase().includes(search)
        );
    }

    if(sort === "players"){
        games.sort((a,b)=> (b.totalPlayers||0) - (a.totalPlayers||0));
    }else if(sort === "visits"){
        games.sort((a,b)=> (b.visits||0) - (a.visits||0));
    }

    document.getElementById("gameCount").innerText = games.length;
    document.getElementById("playerCount").innerText =
        games.reduce((a,b)=>a + (b.totalPlayers||0),0);

    container.innerHTML = "";

    games.forEach(game=>{
        const card = document.createElement("div");
        card.className = "game-card";

        const servers = game.jobIds
            ? Object.keys(game.jobIds).slice(0, 10).map(jobId=>{
                const url = `https://www.roblox.com/games/start?placeId=${game.placeId}&gameInstanceId=${jobId}`;
                return `
                    <button class="join-btn"
                        onclick="window.open('${url}','_blank')">
                        JOIN SERVER (${jobId.slice(0,6)}...)
                    </button>
                `;
            }).join("")
            : "<p style='color:gray'>No active servers</p>";

        card.innerHTML = `
            <div class="game-thumb" style="background-image:url('${game.thumbnail}')">
                <div class="game-badge">LIVE</div>
            </div>

            <div class="game-content">
                <div class="game-name">${game.name}</div>
                <div class="game-owner">by ${game.creator}</div>

                <div class="game-stats">
                    <div class="stat-item"><div class="stat-val">${game.totalPlayers}</div><div>PLAYERS</div></div>
                    <div class="stat-item"><div class="stat-val">${game.currentPlayers}</div><div>CURRENT</div></div>
                    <div class="stat-item"><div class="stat-val">${game.maxPlayers}</div><div>MAX</div></div>
                    <div class="stat-item"><div class="stat-val">${Number(game.visits||0).toLocaleString()}</div><div>VISITS</div></div>
                </div>

                <div class="server-list">
                    ${servers}
                </div>
            </div>
        `;

        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", renderGames);
document.getElementById("sort").addEventListener("change", renderGames);

setInterval(fetchGames, 30000);
fetchGames();
</script>

</body>
</html>
